<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeteoTracker - Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .brand-icon {
            font-size: 3rem;
            color: #1e3c72;
        }
        .btn-login {
            background-color: #1e3c72;
            color: white;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background-color: #2a5298;
            color: white;
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <div class="mb-3">
            <i class="fa-solid fa-cloud-sun-rain brand-icon"></i>
            <h2 class="fw-bold mt-2 text-dark">MeteoTracker</h2>
            <p class="text-muted">Вход в системата</p>
        </div>

        <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>

        <form id="loginForm" class="text-start">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Потребителско име</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control" id="username" required placeholder="Въведете потребителско име">
                </div>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Парола</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" required placeholder="Въведете парола">
                </div>
            </div>

            <button type="submit" class="btn btn-login w-100 py-2 shadow-sm">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Влез
            </button>
        </form>

        <div class="mt-4 text-center">
            <p class="small text-muted">Нямаш акаунт? 
                <a href="register.html" class="text-decoration-none fw-bold" style="color: #1e3c72;">Регистрирай се</a>
            </p>
        </div>
        
        <div class="mt-4">
            <a href="index.html" class="text-decoration-none text-muted small">
                <i class="fa-solid fa-arrow-left me-1"></i> Обратно към началото
            </a>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://localhost:7025"; 

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Stop standart reloading of the page on form submission

            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.classList.add('d-none'); // Hide previous error messages

            try {
                // Send API POST request to the backend for login
                const response = await fetch(`${API_BASE_URL}/api/Auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: usernameInput,
                        password: passwordInput
                    })
                });

                // 1. Check if the request was successful (Status 200-299)
                if (response.ok) {
                    const data = await response.json();
                    
                    // Success: Save the data in the browser
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', usernameInput);
                    localStorage.setItem('role', data.role || data.userRole || 'Admin'); 

                    // Redirect to the home page
                    window.location.href = 'index.html';
                } 
                // 2. PROCESSING SPECIFIC ERRORS FROM THE BACKEND (Wrong password, non-existent user, etc.)
                else {
                    let errorMessage = "Невалидни потребителски данни!";
                    
                    try {
                        // Try reading JSON error response 
                        const errorData = await response.json();
                        errorMessage = errorData.message || errorData.error || errorMessage;
                    } catch (jsonError) {
                        // If backend has returned plain text instead of JSON
                        try {
                            const textError = await response.text();
                            if (textError) errorMessage = textError;
                        } catch (textError) {
                            if (response.status === 404) {
                                errorMessage = "Потребителят не съществува!";
                            } else if (response.status === 400) {
                                errorMessage = "Грешно потребителско име или парола!";
                            }
                        }
                    }

                    // Show relevant error message to the user
                    errorDiv.innerText = errorMessage;
                    errorDiv.classList.remove('d-none');
                }
            } catch (error) {
                // 3. If the backend is not connected (Stopped API, internet issues, etc.)
                errorDiv.innerText = "Грешка при връзка с бекенда. Уверете се, че API-то работи!";
                errorDiv.classList.remove('d-none');
                console.error("Network Error:", error);
            }
        });
    </script>
</body>
</html>
