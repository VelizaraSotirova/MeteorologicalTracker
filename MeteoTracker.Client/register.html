<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeteoTracker - Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .register-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
        }
        .brand-icon {
            font-size: 3rem;
            color: #1e3c72;
        }
        .btn-register {
            background-color: #1e3c72;
            color: white;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn-register:hover {
            background-color: #2a5298;
            color: white;
        }
    </style>
</head>
<body>

    <div class="register-card text-center">
        <div class="mb-3">
            <i class="fa-solid fa-user-plus brand-icon"></i>
            <h2 class="fw-bold mt-2 text-dark">MeteoTracker</h2>
            <p class="text-muted">Създаване на нов профил</p>
        </div>

        <div id="messageBox" class="alert d-none" role="alert"></div>

        <form id="registerForm" class="text-start">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Потребителско име</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control" id="username" required placeholder="Изберете потребителско име">
                </div>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Парола</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" required placeholder="Въведете силна парола">
                </div>
            </div>

            <div class="mb-4">
                <label for="confirmPassword" class="form-label fw-semibold">Потвърдете паролата</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-shield-halved"></i></span>
                    <input type="password" class="form-control" id="confirmPassword" required placeholder="Въведете паролата отново">
                </div>
            </div>

            <button type="submit" class="btn btn-register w-100 py-2 shadow-sm">
                <i class="fa-solid fa-id-card me-2"></i>Регистрирай се
            </button>
        </form>

        <div class="mt-4">
            <p class="small text-muted">Вече имате профил? 
                <a href="login.html" class="text-decoration-none fw-bold" style="color: #1e3c72;">Влезте оттук</a>
            </p>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://localhost:7025"; 

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const confirmPasswordInput = document.getElementById('confirmPassword').value;
            const msgBox = document.getElementById('messageBox');
            
            msgBox.classList.add('d-none');
            msgBox.className = "alert"; 

            if (passwordInput !== confirmPasswordInput) {
                msgBox.innerText = "Паролите не съвпадат!";
                msgBox.classList.add('alert-danger');
                msgBox.classList.remove('d-none');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/Auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: usernameInput,
                        password: passwordInput
                    })
                });

                const data = await response.json();

                if (response.ok && data.success !== false) {
                    // Auto login: Save data directly in localStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', usernameInput);
                    localStorage.setItem('role', data.role || 'User'); 

                    msgBox.innerText = "Регистрацията е успешна! Влизане в системата...";
                    msgBox.classList.add('alert-success');
                    msgBox.classList.remove('d-none');
                    
                    // Redirect directly to the home page after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    msgBox.innerText = data.message || "Грешка при регистрация.";
                    msgBox.classList.add('alert-danger');
                    msgBox.classList.remove('d-none');
                }
            } catch (error) {
                msgBox.innerText = "Няма връзка със сървъра. Уверете се, че API-то работи!";
                msgBox.classList.add('alert-danger');
                msgBox.classList.remove('d-none');
                console.error("Register Error:", error);
            }
        });
    </script>
</body>
</html>
